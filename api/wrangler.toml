name = "jeongdamgudo-api"
main = "src/index.js"
compatibility_date = "2024-09-01"

[vars]
ALLOWED_ORIGIN = "*"
NAS_WORKER_URL = ""           # e.g. "https://jeongdamgudo-nas.YOURSUB.workers.dev"

# Bind D1 database (after `wrangler d1 create jeongdamgudo-db`)
[[d1_databases]]
binding = "DB"
database_name = "jeongdamgudo-db"
database_id = "REPLACE_WITH_YOUR_DATABASE_ID"

# Secrets to set via CLI:
#   wrangler secret put JWT_SECRET     # 64-char random string
#   wrangler secret put ADMIN_PASS     # initial admin password (used by /init)
#   wrangler secret put NAS_API_KEY    # if NAS Worker uses an API key
